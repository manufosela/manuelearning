<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#84cc16" />
  <title>Sin conexión | ManuElearning</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #f8f9fa;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .offline-card {
      max-width: 420px;
      text-align: center;
      background: #fff;
      border-radius: 16px;
      padding: 3rem 2rem;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .offline-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 {
      font-family: 'Lexend', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #0f172a;
    }
    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 2rem;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: #84cc16;
      color: #0f172a;
      border: none;
      border-radius: 8px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
    }
    .retry-btn:hover { background: #65a30d; }
    .brand {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #94a3b8;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <span class="offline-icon" aria-hidden="true">&#x1F4F6;</span>
    <h1>Sin conexión</h1>
    <p>No tienes conexión a internet en este momento. Las lecciones que hayas visitado anteriormente están disponibles desde la caché.</p>
    <a href="/" class="retry-btn">Reintentar</a>
    <div class="brand">ManuElearning</div>
  </div>
</body>
</html>
